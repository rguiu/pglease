name: Publish to Production PyPI

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to confirm'
        required: true
        type: string

jobs:
  publish:
    name: Publish to Production PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publisher (OIDC)

    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "publish" ]; then
            echo "You must type 'publish' to confirm"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Verify a version tag is selected
        run: |
          if [[ "${{ github.ref_name }}" != v* ]]; then
            echo "You must select a version tag (e.g. v0.2.0), not a branch"
            exit 1
          fi
          echo "Publishing ${{ github.ref_name }} to PyPI"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
