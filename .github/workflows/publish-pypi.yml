name: Publish to Production PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g., v0.2.0)'
        required: true
        type: string
      confirm:
        description: 'Type "publish" to confirm'
        required: true
        type: string

jobs:
  publish:
    name: Publish to Production PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publisher (OIDC)

    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "publish" ]; then
            echo "You must type 'publish' to confirm"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0

      - name: Verify version tag exists
        run: |
          if ! git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.version }} does not exist"
            exit 1
          fi
          echo "Publishing version ${{ inputs.version }} to PyPI"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
